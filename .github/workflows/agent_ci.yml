name: Infra Agent Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq python-dotenv httpx

      - name: Test simulator
        run: python tests/test_simulator.py

      - name: Test tools
        run: python tests/test_tools.py

      - name: Test agent decisions
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python tests/test_agent_ci.py